    <script>
      (function(){
        // ✅ FIX: Capacitor(안드로이드 앱) 내부에서는 리다이렉트 완전 차단
        var isCapacitor = (typeof window.Capacitor !== 'undefined') || (window.navigator && window.navigator.userAgent.indexOf('Capacitor') >= 0);
        if (isCapacitor) return;

        var h = location.hostname;
        var proto = location.protocol;
        if (proto !== 'https:' || h === 'fishing-go.com') {
          location.replace('https://www.fishing-go.com' + location.pathname + location.search + location.hash);
        }
      })();
    </script>
    <!-- ✅ GH Pages SPA 라우팅: 404.html이 저장한 URL 복원 -->
    <script>
      (function(){
        var redirect = sessionStorage.redirect;
        if (redirect) {
          delete sessionStorage.redirect;
          // 저장된 전체 URL에서 pathname+search+hash만 추출해 복원
          try {
            var url = new URL(redirect);
            if (url.pathname !== '/' && url.pathname !== location.pathname) {
              history.replaceState(null, null, url.pathname + url.search + url.hash);
            }
          } catch(e) {}
        }
      })();
    </script>

        };
