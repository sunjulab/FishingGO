name: FishingGO Auto Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  # Render 서버 자동 재배포 (Vercel은 GitHub 연동으로 자동 처리됨)
  deploy-backend:
    name: Trigger Render Backend Redeploy
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy Hook
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          echo "✅ Render 서버 재배포 트리거 완료"
