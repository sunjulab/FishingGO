name: FishingGO Auto Deploy

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:

  deploy-backend:
    name: "Render Backend Deploy"
    runs-on: ubuntu-22.04
    continue-on-error: true
    steps:
      - name: Trigger Render Deploy Hook
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            echo "RENDER_DEPLOY_HOOK_URL not set - skipping"
            exit 0
          fi
          http_code=$(curl --silent --output /dev/null --write-out "%{http_code}" \
            --max-time 30 -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}")
          if [ "$http_code" -ge 200 ] && [ "$http_code" -lt 300 ]; then
            echo "Render deploy triggered (HTTP $http_code)"
          else
            echo "Render deploy response: HTTP $http_code"
          fi

  deploy-vercel:
    name: "Vercel Frontend Deploy"
    runs-on: ubuntu-22.04
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN:      ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID:     team_tgUYwp8FC1EdVmVFJ3M5yy23
          VERCEL_PROJECT_ID: prj_B1vBzBHEHqXs2MOH7nJFd8MlTbM9
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "VERCEL_TOKEN not set - skipping"
            exit 0
          fi
          npx vercel@latest --prod --token "$VERCEL_TOKEN" --yes

  build-apk:
    name: "Android APK Build"
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;25.2.9519653"

      - name: Install SDK components + show installed
        run: |
          echo "=== Pre-installed platforms ==="
          sdkmanager --list 2>/dev/null | grep -E 'platforms;android|build-tools' | head -20 || true
          echo "=== Installing API 35 + build-tools 35.0.0 ==="
          sdkmanager --install "platforms;android-35" "build-tools;35.0.0" || true
          echo "=== Done ==="

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Install npm dependencies
        run: npm install

      - name: Fix esbuild for Linux
        run: npm rebuild esbuild

      - name: Build frontend (esbuild)
        env:
          VITE_API_URL:       ${{ secrets.VITE_API_URL }}
          VITE_KAKAO_APP_KEY: ${{ secrets.VITE_KAKAO_APP_KEY }}
          VITE_TIDE_API_KEY:  ${{ secrets.VITE_TIDE_API_KEY }}
          VITE_ADMOB_TESTING: 'true'
          VITE_SITE_URL:      'https://www.fishing-go.com'
          VITE_DISABLE_PWA:   'true'
        run: node build-esbuild.mjs

      - name: Capacitor sync
        run: node_modules/.bin/cap sync android || echo "cap sync skipped"

      - name: Make gradlew executable
        run: |
          chmod +x android/gradlew
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          echo "local.properties: $(cat android/local.properties)"

      - name: Restore google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" | base64 --decode > android/app/google-services.json
            echo "google-services.json restored"
          else
            echo "GOOGLE_SERVICES_JSON not set - Firebase disabled"
          fi


      - name: Verify signing files
        run: |
          echo "=== Keystore ==="
          ls -la android/fishinggo-release.jks 2>/dev/null || echo "keystore NOT FOUND"
          echo "=== google-services.json ==="
          ls -la android/app/google-services.json 2>/dev/null || echo "google-services.json NOT FOUND"
          echo "=== build.gradle signing config ==="
          grep -A5 'keystoreFile' android/app/build.gradle | head -10

      - name: Build Release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}
        run: |
          set -eo pipefail
          ./gradlew assembleRelease --no-daemon --stacktrace 2>&1
        working-directory: android


      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: fishinggo-release-${{ github.run_number }}
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Build summary
        run: |
          APK=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          if [ -f "$APK" ]; then
            echo "APK built: $(basename $APK) ($(du -sh $APK | cut -f1))"
          fi
