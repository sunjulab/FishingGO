name: 🐟 Render Keep-Alive (슬립 방지)

on:
  schedule:
    # UTC 기준 매 5분 — Render 15분 슬립 완전 방지 (여유 10분 확보)
    - cron: '*/5 * * * *'
  workflow_dispatch:  # 수동 실행 가능

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping Render Backend (/api/health)
        run: |
          echo "🏓 Pinging fishing-go-backend.onrender.com..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 \
            https://fishing-go-backend.onrender.com/api/health)
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "✅ 서버 정상 응답 — kmaBeachCache 유지됨"
          else
            echo "⚠️ 서버 응답 이상: $STATUS"
          fi
