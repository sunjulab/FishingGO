name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy dist/ to gh-pages branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
          cname: www.fishing-go.com   # ✅ CNAME 자동 설정

      - name: Enable GitHub Pages via API (gh-pages branch)
        run: |
          echo "Configuring GitHub Pages source to gh-pages branch..."
          # 먼저 Pages가 이미 활성화되어 있는지 확인
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/pages)

          if [ "$STATUS" = "200" ]; then
            echo "Pages already enabled. Updating source..."
            curl -s -X PUT \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/${{ github.repository }}/pages \
              -d '{"source":{"branch":"gh-pages","path":"/"}}'
          else
            echo "Enabling Pages for the first time..."
            curl -s -X POST \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/${{ github.repository }}/pages \
              -d '{"source":{"branch":"gh-pages","path":"/"}}'
          fi
          echo "Done."
