name: Render Keep-Alive Ping

on:
  schedule:
    - cron: '*/5 * * * *'   # 5분마다 실행
  workflow_dispatch:         # 수동 실행도 가능

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Server
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 https://fishing-go-backend.onrender.com/api/health)
          echo "Response: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "✅ Render 서버 정상"
          else
            echo "⚠️ Render 응답: $STATUS"
          fi
