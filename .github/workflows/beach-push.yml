name: 🌊 해수욕장 수온 자동 푸시

on:
  schedule:
    - cron: '5 * * * *'  # 매 시간 5분에 실행 (KMA 데이터 갱신 후)
  workflow_dispatch:      # 수동 실행 버튼

jobs:
  beach-push:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 🌊 KMA 해수욕장 수온 수집 → Render 서버 푸시
        run: |
          echo "=== $(date '+%Y-%m-%d %H:%M:%S KST') beach-push 시작 ==="

          # ── STEP 0: Render 서버 웜업 (슬립 상태면 깨우기) ──────────────────
          echo "🔄 Render 서버 웜업 중..."
          curl -s --max-time 60 "https://fishing-go-backend.onrender.com/api/health" > /dev/null || true
          echo "✅ 웜업 완료"

          # ── STEP 1: KMA 해수욕장 API 호출 (최대 3회 재시도) ──────────────
          RC="ERR"
          for i in 1 2 3; do
            RESP=$(curl -s --max-time 20 \
              "https://apis.data.go.kr/1360000/BeachInfoservice/getBeachCurrentWeather?serviceKey=${{ secrets.KMA_SERVICE_KEY }}&numOfRows=200&dataType=JSON")

            RC=$(echo "$RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['response']['header']['resultCode'])" 2>/dev/null || echo "ERR")

            if [ "$RC" = "00" ]; then
              echo "✅ KMA API 성공 (시도 $i)"
              break
            else
              MSG=$(echo "$RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['response']['header'].get('resultMsg',''))" 2>/dev/null || echo "파싱오류")
              echo "⚠️ KMA API 실패: RC=$RC MSG=$MSG (시도 $i/3)"
              sleep 10
            fi
          done

          if [ "$RC" != "00" ]; then
            echo "❌ KMA API 3회 모두 실패 — Secret KMA_SERVICE_KEY 확인 필요"
            exit 1
          fi

          # ── STEP 2: 필요 필드만 추출 (beachNm, wTemp, reginNm) ───────────
          ITEMS=$(echo "$RESP" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          raw = d['response']['body']['items']['item']
          out = [{'beachNm': i.get('beachNm',''), 'wTemp': i.get('wTemp',''), 'reginNm': i.get('reginNm','')} for i in raw]
          print(json.dumps(out))
          ")

          COUNT=$(echo "$ITEMS" | python3 -c "import sys,json; print(len(json.load(sys.stdin)))")
          echo "수집: ${COUNT}개 해수욕장"

          # ── STEP 3: Render 서버로 POST (최대 3회 재시도) ─────────────────
          # BEACH_PUSH_KEY Secret 미등록 시 서버 기본값 사용
          PUSH_KEY="${{ secrets.BEACH_PUSH_KEY }}"
          if [ -z "$PUSH_KEY" ]; then
            PUSH_KEY="fishinggo-beach-2024"
            echo "⚠️ BEACH_PUSH_KEY Secret 미등록 → 서버 기본값 사용"
          fi

          BODY="{\"items\": $ITEMS}"
          OK="false"
          for i in 1 2 3; do
            PUSH_RESP=$(curl -s --max-time 60 -X POST \
              "https://fishing-go-backend.onrender.com/api/internal/beach-push" \
              -H "Content-Type: application/json" \
              -H "x-push-key: $PUSH_KEY" \
              -d "$BODY")

            OK=$(echo "$PUSH_RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(str(d.get('ok',False)))" 2>/dev/null || echo "False")
            PATCHED=$(echo "$PUSH_RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('patched',0))" 2>/dev/null || echo "0")

            if [ "$OK" = "True" ]; then
              echo "✅ 서버 푸시 성공: ${COUNT}개 (즉시 패치: ${PATCHED}개)"
              break
            else
              echo "⚠️ 서버 연결 오류 (시도 $i/3): $PUSH_RESP"
              sleep 15
            fi
          done

          if [ "$OK" != "True" ]; then
            echo "❌ 서버 푸시 3회 모두 실패 — Render 서버 상태 확인 필요"
            exit 1
          fi

          echo "=== beach-push 완료 ==="
