name: 🌊 해수욕장 수온 자동 푸시

on:
  schedule:
    - cron: '5 * * * *'  # 매 시간 5분에 실행
  workflow_dispatch:

jobs:
  beach-push:
    runs-on: ubuntu-latest
    timeout-minutes: 8   # 5 → 8분으로 증가

    steps:
      - name: 🌊 KMA 해수욕장 수온 수집 → Render 서버 푸시
        run: |
          echo "=== $(date '+%Y-%m-%d %H:%M:%S') beach-push 시작 ==="

          # ── STEP 0: Render 웜업 (백그라운드) ─────────────────────────────
          curl -s --max-time 30 "https://fishing-go-backend.onrender.com/api/health" > /dev/null &
          WARMUP_PID=$!

          # ── STEP 1: KMA getTwBuoyBeach — 병렬 4개씩 수집 ────────────────
          SEARCH_TIME=$(TZ='Asia/Seoul' date '+%Y%m%d%H%M')
          KEY="${{ secrets.KMA_SERVICE_KEY }}"
          echo "📡 searchTime=$SEARCH_TIME"

          # 임시 결과 디렉토리
          mkdir -p /tmp/beach

          # beach_num 1~120 병렬 4개씩 처리 (120번까지 유효 데이터 확인됨)
          for START in $(seq 1 4 120); do
            for OFFSET in 0 1 2 3; do
              NUM=$((START + OFFSET))
              [ $NUM -gt 120 ] && continue
              (
                R=$(curl -s --max-time 4 \
                  "https://apis.data.go.kr/1360000/BeachInfoservice/getTwBuoyBeach?serviceKey=${KEY}&dataType=JSON&numOfRows=1&pageNo=1&beach_num=${NUM}&searchTime=${SEARCH_TIME}")
                RC=$(echo "$R" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['response']['header']['resultCode'])" 2>/dev/null || echo "ERR")
                if [ "$RC" = "00" ]; then
                  TW=$(echo "$R" | python3 -c "import sys,json; d=json.load(sys.stdin); it=d['response']['body']['items']['item']; print(it[0]['tw'] if it else '')" 2>/dev/null || echo "")
                  TM=$(echo "$R" | python3 -c "import sys,json; d=json.load(sys.stdin); it=d['response']['body']['items']['item']; print(it[0]['tm'] if it else '')" 2>/dev/null || echo "")
                  [ -n "$TW" ] && echo "{\"beachNum\":\"${NUM}\",\"tw\":\"${TW}\",\"tm\":\"${TM}\"}" > /tmp/beach/${NUM}.json
                fi
              ) &
            done
            wait  # 4개 묶음 완료 후 다음으로
          done

          # 결과 합치기
          ITEMS="["
          FIRST=1
          SUCCESS=0
          for f in $(ls /tmp/beach/*.json 2>/dev/null | sort -t/ -k4 -n); do
            [ "$FIRST" = "0" ] && ITEMS="${ITEMS},"
            ITEMS="${ITEMS}$(cat $f)"
            FIRST=0
            SUCCESS=$((SUCCESS+1))
          done
          ITEMS="${ITEMS}]"
          echo "✅ 수온 수집: ${SUCCESS}개 해변"

          if [ "$SUCCESS" = "0" ]; then
            echo "❌ 수온 데이터 없음 — KMA_SERVICE_KEY 또는 API 상태 확인"
            exit 1
          fi

          # ── STEP 2: Render 웜업 완료 대기 ────────────────────────────────
          wait $WARMUP_PID 2>/dev/null || true
          echo "✅ Render 웜업 완료"

          # ── STEP 3: Render 서버 푸시 (최대 3회) ──────────────────────────
          PUSH_KEY="${{ secrets.BEACH_PUSH_KEY }}"
          [ -z "$PUSH_KEY" ] && PUSH_KEY="fishinggo-beach-2024"

          BODY="{\"items\": $ITEMS}"
          OK="false"

          for i in 1 2 3; do
            PUSH_RESP=$(curl -s --max-time 60 -X POST \
              "https://fishing-go-backend.onrender.com/api/internal/beach-push" \
              -H "Content-Type: application/json" \
              -H "x-push-key: $PUSH_KEY" \
              -d "$BODY")

            OK=$(echo "$PUSH_RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(str(d.get('ok',False)))" 2>/dev/null || echo "False")
            PATCHED=$(echo "$PUSH_RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('patched',0))" 2>/dev/null || echo "0")

            if [ "$OK" = "True" ]; then
              echo "✅ 서버 푸시 성공: ${SUCCESS}개 수온 → weatherCache 패치: ${PATCHED}개"
              break
            else
              echo "⚠️ 서버 오류 (시도 $i/3): $PUSH_RESP"
              sleep 15
            fi
          done

          if [ "$OK" != "True" ]; then
            echo "❌ 서버 푸시 3회 실패"
            exit 1
          fi

          echo "=== beach-push 완료 ==="
