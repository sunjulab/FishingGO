name: 🌊 해수욕장 수온 자동 푸시

on:
  schedule:
    - cron: '5 * * * *'  # 매 시간 5분에 실행 (KMA 데이터 갱신 후)
  workflow_dispatch:      # 수동 실행 버튼

jobs:
  beach-push:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 🌊 KMA 해수욕장 수온 수집 → Render 서버 푸시
        run: |
          echo "=== $(date '+%Y-%m-%d %H:%M:%S KST') beach-push 시작 ==="

          # ── STEP 0: Render 서버 웜업 ──────────────────────────────────────
          curl -s --max-time 60 "https://fishing-go-backend.onrender.com/api/health" > /dev/null || true
          echo "✅ Render 웜업 완료"

          # ── STEP 1: KMA getTwBuoyBeach API — beach_num 1~200 수온 수집 ───
          # 파라미터: beach_num (해변코드), searchTime (YYYYMMDDhhmm)
          SEARCH_TIME=$(TZ='Asia/Seoul' date '+%Y%m%d%H%M')
          echo "📡 searchTime: $SEARCH_TIME"

          ITEMS="["
          FIRST=1
          SUCCESS=0

          for NUM in $(seq 1 200); do
            RESP=$(curl -s --max-time 5 \
              "https://apis.data.go.kr/1360000/BeachInfoservice/getTwBuoyBeach?serviceKey=${{ secrets.KMA_SERVICE_KEY }}&dataType=JSON&numOfRows=1&pageNo=1&beach_num=${NUM}&searchTime=${SEARCH_TIME}")

            RC=$(echo "$RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['response']['header']['resultCode'])" 2>/dev/null || echo "ERR")

            if [ "$RC" = "00" ]; then
              TW=$(echo "$RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); items=d['response']['body']['items']['item']; print(items[0]['tw'] if items else '')" 2>/dev/null || echo "")
              TM=$(echo "$RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); items=d['response']['body']['items']['item']; print(items[0]['tm'] if items else '')" 2>/dev/null || echo "")

              if [ -n "$TW" ]; then
                if [ "$FIRST" = "1" ]; then
                  FIRST=0
                else
                  ITEMS="${ITEMS},"
                fi
                ITEMS="${ITEMS}{\"beachNum\":\"${NUM}\",\"wTemp\":\"${TW}\",\"tm\":\"${TM}\"}"
                SUCCESS=$((SUCCESS+1))
              fi
            fi
          done

          ITEMS="${ITEMS}]"
          echo "✅ 수온 데이터 수집: ${SUCCESS}개 해변"

          if [ "$SUCCESS" = "0" ]; then
            echo "❌ 수온 데이터 없음 — KMA_SERVICE_KEY 또는 API 상태 확인"
            exit 1
          fi

          # ── STEP 2: Render 서버 푸시 ─────────────────────────────────────
          PUSH_KEY="${{ secrets.BEACH_PUSH_KEY }}"
          if [ -z "$PUSH_KEY" ]; then
            PUSH_KEY="fishinggo-beach-2024"
          fi

          BODY="{\"items\": $ITEMS}"
          OK="false"

          for i in 1 2 3; do
            PUSH_RESP=$(curl -s --max-time 60 -X POST \
              "https://fishing-go-backend.onrender.com/api/internal/beach-push" \
              -H "Content-Type: application/json" \
              -H "x-push-key: $PUSH_KEY" \
              -d "$BODY")

            OK=$(echo "$PUSH_RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(str(d.get('ok',False)))" 2>/dev/null || echo "False")
            PATCHED=$(echo "$PUSH_RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('patched',0))" 2>/dev/null || echo "0")

            if [ "$OK" = "True" ]; then
              echo "✅ 서버 푸시 성공: ${SUCCESS}개 수온 → weatherCache 즉시 패치: ${PATCHED}개"
              break
            else
              echo "⚠️ 서버 연결 오류 (시도 $i/3): $PUSH_RESP"
              sleep 15
            fi
          done

          if [ "$OK" != "True" ]; then
            echo "❌ 서버 푸시 3회 실패"
            exit 1
          fi

          echo "=== beach-push 완료 ==="
